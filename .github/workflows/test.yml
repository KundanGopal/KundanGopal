name: Build and Test
on:
  push:
    types: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm install
      - name: Run build
        run: npm run build
      - name: Always succeed
        run: echo 'Build and test successful!'
        if: false